# Sample ER diagram for testing
meta:
  id: user-management
  title: User Management DB
  graph-version: 1
  version: 1
  description: Entity-relationship diagram for user management

entities:
  User:
    attributes:
      - name: id
        type: int
        key: PK
      - name: email
        type: string
        key: UK
        nullable: false
      - name: name
        type: string
      - name: role_id
        type: int
        key: FK

  Role:
    attributes:
      - name: id
        type: int
        key: PK
      - name: name
        type: string
        nullable: false

  Permission:
    attributes:
      - name: id
        type: int
        key: PK
      - name: action
        type: string
      - name: resource
        type: string

relationships:
  - from: User
    to: Role
    type: many-to-one
    label: has
  - from: Role
    to: Permission
    type: one-to-many
    label: grants
  - from: User
    to: Permission
    type: many-to-many
    label: assigned
