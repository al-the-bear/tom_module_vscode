# Sample flowchart for testing
meta:
  id: build-pipeline
  title: Build Pipeline
  graph-version: 1
  version: 1
  direction: TD
  description: A sample build pipeline for testing

# The nodes of the flowchart
nodes:
  start:
    type: start
    label: Begin
  checkout:
    type: process
    label: Checkout Code
    status: implemented
    owner: ci-team
    tags:
      - git
      - scm
  build:
    type: process
    label: Build Project
    status: implemented
  test:
    type: decision
    label: Tests Pass?
    status: planned
  deploy:
    type: subprocess
    label: Deploy to Staging
    status: planned
    description: Deploy using docker containers
  done:
    type: end
    label: Finished

# Connections between nodes
edges:
  - from: start
    to: checkout
  - from: checkout
    to: build
  - from: build
    to: test
  - from: test
    to: deploy
    label: "yes"
  - from: test
    to: checkout
    label: "no"
    style: dotted
  - from: deploy
    to: done
    style: thick
